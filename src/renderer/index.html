<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      CSP: locked to 'self' except for the optional enhanced-voice feature,
      which downloads the Kokoro neural-TTS model + ONNX WASM runtime at the
      user's explicit request. Those need:
        - connect-src to Hugging Face (model weights) + jsDelivr (WASM binaries)
        - 'wasm-unsafe-eval' to run the ONNX WebAssembly
      No remote SCRIPTS are ever loaded (script-src stays 'self'); only data
      (model/wasm) is fetched cross-origin. The Anthropic press calls go through
      the main process, not the renderer, so api.anthropic.com is intentionally
      NOT in connect-src here.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; worker-src 'self' blob:; connect-src 'self' blob: data: https://huggingface.co https://*.hf.co https://cdn.jsdelivr.net"
    />
    <title>Hockey Manager</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
